<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jobs.ac.uk tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f1eb;
      --surface: #fffdf9;
      --ink: #1a1814;
      --ink2: #6b6660;
      --ink3: #a8a4a0;
      --accent: #2c5f2e;
      --accent-light: #e8f0e8;
      --red: #8b2a2a;
      --border: #dedad4;
      --mono: "DM Mono", monospace;
      --serif: "DM Serif Display", Georgia, serif;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 2rem;
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 400;
      font-style: italic;
      color: var(--ink);
      line-height: 1.1;
    }

    h1 span {
      color: var(--accent);
    }

    .meta {
      margin-left: auto;
      text-align: right;
      font-size: 12px;
      color: var(--ink3);
    }

    .meta strong {
      display: block;
      color: var(--ink2);
      font-weight: 500;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem;
    }

    .keyword-section {
      margin-bottom: 3rem;
    }

    .keyword-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .keyword-label {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-style: italic;
      color: var(--ink);
    }

    .keyword-count {
      font-size: 12px;
      color: var(--ink3);
    }

    .keyword-link {
      margin-left: auto;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      padding: 2px 10px;
      border-radius: 2px;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .keyword-link:hover {
      background: var(--accent-light);
    }

    .jobs-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.875rem 1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem 1rem;
      align-items: start;
      transition: border-color 0.15s;
    }

    .job-card:first-child { border-radius: 4px 4px 0 0; }
    .job-card:last-child  { border-radius: 0 0 4px 4px; }
    .job-card:only-child  { border-radius: 4px; }

    .job-card:hover {
      border-color: var(--accent);
    }

    .job-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      line-height: 1.4;
    }

    .job-title:hover { color: var(--accent); }

    .job-meta {
      font-size: 11px;
      color: var(--ink3);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-top: 3px;
    }

    .job-meta span { display: flex; align-items: center; gap: 4px; }

    .dot {
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--ink3);
      flex-shrink: 0;
    }

    .visit-btn {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      font-weight: 500;
      padding-top: 2px;
    }

    .visit-btn:hover { text-decoration: underline; }

    .empty {
      font-size: 13px;
      color: var(--ink3);
      font-style: italic;
      padding: 1.5rem 0;
    }

    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--ink3);
      font-style: italic;
    }

    .error-box {
      background: #fff5f5;
      border: 1px solid #f5c6c6;
      color: var(--red);
      padding: 1rem 1.25rem;
      border-radius: 4px;
      font-size: 13px;
      margin-top: 2rem;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 11px;
      color: var(--ink3);
    }

    footer a { color: var(--ink2); }

    @media (max-width: 540px) {
      header, main { padding: 1.25rem; }
      .header-inner { flex-direction: column; align-items: flex-start; }
      .meta { text-align: left; margin-left: 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>jobs<span>.ac.uk</span><br>tracker</h1>
    <div class="meta" id="meta">
      <strong>Loading…</strong>
    </div>
  </div>
</header>

<main id="main">
  <div class="loading">Fetching results…</div>
</main>

<footer>
  Updated automatically every day via GitHub Actions &mdash;
  <a href="https://www.jobs.ac.uk" target="_blank" rel="noreferrer">jobs.ac.uk</a>
</footer>

<script>
  const fmt = iso => {
    if (!iso) return "unknown";
    const d = new Date(iso);
    return d.toLocaleString("en-GB", {
      day: "numeric", month: "short", year: "numeric",
      hour: "2-digit", minute: "2-digit", timeZone: "Europe/London"
    }) + " (UK)";
  };

  async function load() {
    const main = document.getElementById("main");
    const meta = document.getElementById("meta");

    try {
      const res = await fetch("results.json?_=" + Date.now());
      if (!res.ok) throw new Error("results.json not found (" + res.status + ")");
      const data = await res.json();

      meta.innerHTML = `<strong>Last updated</strong>${fmt(data.updated_at)}`;

      const keywords = Object.entries(data.keywords || {});
      if (!keywords.length) {
        main.innerHTML = '<p class="empty">No keywords configured yet.</p>';
        return;
      }

      main.innerHTML = "";
      for (const [kw, info] of keywords) {
        const section = document.createElement("section");
        section.className = "keyword-section";

        const jobs = info.jobs || [];
        const jobsHtml = jobs.length
          ? jobs.map(j => `
              <div class="job-card">
                <div>
                  <a class="job-title" href="${esc(j.url)}" target="_blank" rel="noreferrer">
                    ${esc(j.title)}
                  </a>
                  <div class="job-meta">
                    ${j.employer ? `<span><span class="dot"></span>${esc(j.employer)}</span>` : ""}
                    ${j.location ? `<span><span class="dot"></span>${esc(j.location)}</span>` : ""}
                    ${j.salary  ? `<span><span class="dot"></span>${esc(j.salary)}</span>`  : ""}
                  </div>
                </div>
                <a class="visit-btn" href="${esc(j.url)}" target="_blank" rel="noreferrer">View →</a>
              </div>`).join("")
          : `<p class="empty">No results found for this keyword today.</p>`;

        section.innerHTML = `
          <div class="keyword-header">
            <span class="keyword-label">${esc(kw)}</span>
            <span class="keyword-count">${jobs.length} result${jobs.length !== 1 ? "s" : ""}</span>
            <a class="keyword-link" href="${esc(info.search_url)}" target="_blank" rel="noreferrer">
              View all on jobs.ac.uk ↗
            </a>
          </div>
          <div class="jobs-list">${jobsHtml}</div>`;

        main.appendChild(section);
      }
    } catch (err) {
      meta.innerHTML = "<strong>Error loading data</strong>";
      main.innerHTML = `
        <div class="error-box">
          <strong>Could not load results.json</strong><br>
          If this is your first time: trigger the GitHub Action manually to generate the file,
          then wait a few minutes for GitHub Pages to update.<br><br>
          Technical detail: ${err.message}
        </div>`;
    }
  }

  function esc(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  load();
</script>
</body>
</html>
