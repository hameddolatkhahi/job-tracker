name: Daily Jobs Scraper

on:
  schedule:
    # Runs every day at 07:00 UTC (08:00 UK time, 09:00 BST in summer)
    - cron: "0 7 * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    # This line tells GitHub to use Node 24 for the actions below
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper
        env:
          KEYWORDS: ${{ vars.KEYWORDS || 'technologist' }}
        run: python scrape.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json
          git diff --cached --quiet || git commit -m "chore: update job results $(date -u +'%Y-%m-%d')"
          git push
